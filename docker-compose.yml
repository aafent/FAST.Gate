services:
  fast-gate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fast-gate
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Gate__Identity__Provider: logto
      Gate__Identity__Logto__IssuerUrl: "https://2uaw9x.logto.app/oidc"
      Gate__Identity__Logto__Audience: "https://fast.gate.internal"
      Gate__Identity__Logto__ServiceClientId: "${GATE_CLIENT_ID}"
      Gate__Identity__Logto__ServiceClientSecret: "${GATE_CLIENT_SECRET}"
      Gate__Identity__Logto__WebClientId: "${GATE_WEB_CLIENT_ID}"
      Gate__Identity__Logto__WebClientSecret: "${GATE_WEB_CLIENT_SECRET}"
      Gate__Sso__Enabled: "true"
      Gate__Sso__AllowedRedirectUris__0: "${SSO_REDIRECT_URI_0}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
